platforms:
  bilibili:
    enabled: true
    dry_run_env: CONTENT_HUB_PUBLISH_DRY_RUN
    credentials:
      sessdata: BILIBILI_SESSDATA
      bili_jct: BILIBILI_BILI_JCT
